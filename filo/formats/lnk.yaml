format: lnk
version: "1.0"
mime:
  - application/x-ms-shortcut
category: executable
extensions:
  - lnk
signatures:
  - offset: 0
    hex: "4C0000000114020000000000C000000000000046"
    description: Windows Shell Link (shortcut) file
    weight: 0.95
footers:
  - hex: "00000000"
    description: End of LNK file or final shell item
description: >
  Windows Shell Link (.lnk) file format. Contains target path, working directory,
  icon location, and optional shell item ID list for shortcuts.
references:
  - https://learn.microsoft.com/en-us/openspecs/windows_protocols/ms-shllink/
