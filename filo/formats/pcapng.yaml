format: pcapng
version: "1.0"
mime:
  - application/vnd.tcpdump.pcap
category: network
extensions:
  - pcapng
  - pcap
signatures:
  - offset: 0
    hex: 0A1D0C4504
    description: PCAPNG Section Header Block (SHB) - little endian
    weight: 0.95
  - offset: 0
    hex: 1A2B3C4D
